apiVersion: v1
kind: ConfigMap
metadata:
  name: api-code
  namespace: default
data:
  server.js: |
    const express = require('express');
    const { Pool } = require('pg');
    const app = express();
    app.use(express.json());

    const pool = new Pool({
      host: process.env.DB_HOST,
      port: process.env.DB_PORT,
      database: process.env.DB_NAME,
      user: process.env.DB_USER,
      password: process.env.DB_PASSWORD,
    });

    pool.query(`
      CREATE TABLE IF NOT EXISTS messages (
        id SERIAL PRIMARY KEY,
        content TEXT NOT NULL,
        created_at TIMESTAMP DEFAULT NOW()
      )
    `).then(() => console.log('Table ready'))
      .catch(err => console.error('Table init error:', err));

    app.get('/health', (req, res) => res.json({ status: 'ok' }));

    app.get('/messages', async (req, res) => {
      try {
        const result = await pool.query('SELECT * FROM messages ORDER BY created_at DESC');
        res.json(result.rows);
      } catch (err) {
        res.status(500).json({ error: err.message });
      }
    });

    app.post('/messages', async (req, res) => {
      try {
        const { content } = req.body;
        const result = await pool.query(
          'INSERT INTO messages (content) VALUES ($1) RETURNING *',
          [content]
        );
        res.json(result.rows[0]);
      } catch (err) {
        res.status(500).json({ error: err.message });
      }
    });

    app.listen(process.env.API_PORT || 3000, () => {
      console.log('API running on port ' + (process.env.API_PORT || 3000));
    });
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
    spec:
      initContainers:
      - name: install-deps
        image: node:18-alpine
        command: ["/bin/sh", "-c"]
        args:
        - |
          cp /code/server.js /app/server.js
          cd /app
          npm init -y
          npm install express pg
        volumeMounts:
        - name: code
          mountPath: /code
        - name: app
          mountPath: /app
      containers:
      - name: api
        image: node:18-alpine
        command: ["node", "/app/server.js"]
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_PORT
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: API_PORT
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
        volumeMounts:
        - name: app
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: api-code
      - name: app
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: default
spec:
  selector:
    app: api-backend
  ports:
  - port: 3000
    targetPort: 3000
