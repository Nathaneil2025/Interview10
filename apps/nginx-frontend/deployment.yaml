apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: default
data:
  nginx.conf: |
    server {
      listen 80;

      location / {
        root /usr/share/nginx/html;
        index index.html;
      }

      location /api/ {
        proxy_pass http://api-service:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>App Stack Demo</title></head>
    <body>
      <h1>Multi-tier App Stack</h1>
      <p>NGINX Frontend → Node.js API → PostgreSQL</p>
      <div id="messages"></div>
      <input id="msg" type="text" placeholder="Enter a message" />
      <button onclick="postMessage()">Send</button>
      <script>
        async function loadMessages() {
          const res = await fetch('/api/messages');
          const data = await res.json();
          document.getElementById('messages').innerHTML =
            data.map(m => '<p>' + m.content + ' - ' + m.created_at + '</p>').join('');
        }
        async function postMessage() {
          const content = document.getElementById('msg').value;
          await fetch('/api/messages', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ content })
          });
          loadMessages();
        }
        loadMessages();
      </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-frontend
  template:
    metadata:
      labels:
        app: nginx-frontend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        - name: nginx-config
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: default
spec:
  selector:
    app: nginx-frontend
  ports:
  - port: 80
    targetPort: 80
